[whisper]
# Model size: tiny.en, base.en, small.en, medium.en, large-v3
model = base.en

# Device: cpu, auto, cuda/nvidia, or amd/rocm
device = cpu

# Compute type: int8 for CPU, float16 for GPU
compute_type = int8

[hotkey]
# Optional fallback when .env is not used. Prefer KEY_* names from `make debug-keys`.
key = f12

[behavior]
# Type text into active input field
auto_type = true

# Show desktop notification
notifications = true
